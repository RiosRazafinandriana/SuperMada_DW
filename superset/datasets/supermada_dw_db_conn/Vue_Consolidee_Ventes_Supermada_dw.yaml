sql: "SELECT \n    v.*, \n    p.nom as nom_produit, p.categorie, \n    m.nom as nom_magasin,\
  \ m.ville as ville_magasin,\n    d.annee, d.nom_mois, d.trimestre, d.nom_jour\n\
  FROM ventes v\nJOIN produits p ON v.id_produit = p.id_produit\nJOIN magasins m ON\
  \ v.id_magasin = m.id_magasin\nJOIN date d ON v.date = d.id_date;"
